<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinamento — ICP, Persona e Concorrentes | impulseup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root, [data-theme="light"]{
  --bg:#FFFFFF;--bg-alt:#F4F2EF;--bg-card:#FFFFFF;--fg:#0C0C0C;--fg-muted:#666666;
  --border:#E0E0E0;--border-md:#CCCCCC;--primary:#CC0088;--primary-h:#A3006D;--primary-d:#770055;
  --primary-dim:rgba(204,0,136,0.08);--primary-glow:rgba(204,0,136,0.2);
  --success:#1A8A44;--success-dim:rgba(26,138,68,0.08);--success-border:rgba(26,138,68,0.25);
  --danger:#CC3322;--danger-dim:rgba(204,51,34,0.08);--danger-border:rgba(204,51,34,0.25);
  --warn:#B47A00;--warn-dim:rgba(180,122,0,0.08);--warn-border:rgba(180,122,0,0.25);
  --r:10px;--r-lg:16px;--font:'Poppins',sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg-alt);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:980px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 28px;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:10px;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-logo{width:26px;height:26px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;}
.brand-text{font-size:14px;font-weight:700;color:var(--fg);}
.brand-text span{color:var(--primary);}
.slide-count{font-size:11px;font-weight:600;color:var(--fg-muted);letter-spacing:.04em;}
.progress-track{height:5px;background:var(--border);border-radius:20px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:20px;transition:width .35s ease;}

/* MAIN */
.stage{flex:1;padding:40px 28px 30px;display:flex;flex-direction:column;}
.slide{display:none;animation:fadeUp .3s ease;}
.slide.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:10px;}
h1.title{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:14px;}
h2.subtitle{font-size:19px;font-weight:700;margin-bottom:12px;letter-spacing:-.3px;}
p.lead{font-size:15px;color:var(--fg-muted);line-height:1.75;margin-bottom:14px;font-weight:400;}
p.lead strong, .body-text strong{color:var(--fg);font-weight:600;}
.body-text{font-size:14px;color:var(--fg-muted);line-height:1.8;margin-bottom:10px;}

.cover{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;min-height:60vh;}
.cover .eyebrow{font-size:12px;}
.cover h1{font-size:42px;margin-bottom:16px;}
.cover p.lead{font-size:16px;max-width:520px;}

.card{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;margin-bottom:14px;}
.card-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:8px;}
.card-title{font-size:14px;font-weight:700;color:var(--fg);margin-bottom:6px;}
.card-body{font-size:13.5px;color:var(--fg-muted);line-height:1.75;}
.card-body ul{margin-left:18px;margin-top:6px;}
.card-body li{margin-bottom:4px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr;}}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;background:var(--primary-dim);color:var(--primary);border:1px solid rgba(204,0,136,.25);margin-right:6px;margin-bottom:6px;}
.pill.muted{background:var(--bg-alt);color:var(--fg-muted);border-color:var(--border-md);}
.pill.good{background:var(--success-dim);color:var(--success);border-color:var(--success-border);}
.pill.bad{background:var(--danger-dim);color:var(--danger);border-color:var(--danger-border);}
.pill.warn{background:var(--warn-dim);color:var(--warn);border-color:var(--warn-border);}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.stat-label{font-size:10.5px;color:var(--fg-muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.stat-val{font-size:20px;font-weight:800;color:var(--fg);}
.stat-sub{font-size:10.5px;color:var(--fg-muted);}

/* persona */
.persona-head{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.persona-avatar{width:64px;height:64px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0;}
.persona-name{font-size:22px;font-weight:800;}
.persona-role{font-size:13px;color:var(--fg-muted);font-weight:500;}
.persona-quote{border-left:3px solid var(--primary);padding:10px 16px;font-style:italic;font-size:13.5px;color:var(--fg);background:var(--primary-dim);border-radius:0 var(--r) var(--r) 0;margin-bottom:16px;}

/* matriz */
.matrix{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;}
.matrix table{width:100%;border-collapse:collapse;font-size:12px;}
.matrix th,.matrix td{padding:10px 8px;text-align:center;border:1px solid var(--border);}
.matrix th{background:var(--bg-alt);font-weight:700;color:var(--fg-muted);font-size:11px;}
.matrix td.icp{background:var(--success-dim);color:var(--success);font-weight:700;}
.matrix td.acp2{background:var(--primary-dim);color:var(--primary);font-weight:600;}
.matrix td.acp3{background:var(--warn-dim);color:var(--warn);font-weight:600;}
.matrix td.acp4{background:#eee;color:var(--fg-muted);font-weight:600;}
.matrix td.ucp{background:var(--danger-dim);color:var(--danger);font-weight:700;}
.matrix td.label{background:var(--bg-alt);font-weight:700;color:var(--fg);text-align:left;}

/* Interactive: classification game */
.game-box{background:var(--bg-alt);border:1px dashed var(--border-md);border-radius:var(--r-lg);padding:22px;margin-bottom:16px;}
.game-scenario{font-size:14px;color:var(--fg);line-height:1.7;margin-bottom:16px;padding:14px 16px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
.opt-btn{min-height:44px;background:var(--bg);border:2px solid var(--border-md);border-radius:var(--r);padding:10px 14px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--fg);cursor:pointer;transition:all .15s;}
.opt-btn:hover{border-color:var(--primary);}
.opt-btn.correct{background:var(--success-dim);border-color:var(--success);color:var(--success);}
.opt-btn.wrong{background:var(--danger-dim);border-color:var(--danger);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.feedback{margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.65;display:none;}
.feedback.show{display:block;animation:fadeUp .25s ease;}
.feedback.correct{background:var(--success-dim);border:1px solid var(--success-border);color:var(--success);}
.feedback.wrong{background:var(--danger-dim);border:1px solid var(--danger-border);color:var(--danger);}

/* flashcard flip */
.flip-card{perspective:1000px;height:220px;cursor:pointer;margin-bottom:16px;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r-lg);border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;justify-content:center;}
.flip-front{background:var(--bg-alt);align-items:center;text-align:center;}
.flip-back{background:var(--primary-dim);transform:rotateY(180deg);border-color:rgba(204,0,136,.3);}
.flip-hint{font-size:11px;color:var(--fg-muted);margin-top:10px;}

/* score */
.score-badge{display:inline-flex;align-items:center;gap:8px;background:var(--primary-dim);border:1px solid rgba(204,0,136,.3);color:var(--primary);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:16px;}

/* footer nav */
.navbar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.nav-btn{min-height:44px;padding:10px 20px;border-radius:var(--r);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid var(--border-md);background:var(--bg);color:var(--fg);}
.nav-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 12px var(--primary-glow);}
.nav-btn.primary:hover{background:var(--primary-h);}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;}
.nav-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:280px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border-md);}
.dot.done{background:var(--primary);}
.dot.current{background:var(--primary);width:16px;border-radius:4px;}

/* end screen */
.end-wrap{text-align:center;padding:40px 0;}
.end-emoji-ring{width:90px;height:90px;border-radius:50%;background:var(--primary-dim);border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:34px;font-weight:800;color:var(--primary);}

@media(max-width:700px){
  .topbar,.stage,.navbar{padding-left:18px;padding-right:18px;}
  .cover h1{font-size:30px;}
  h1.title{font-size:24px;}
  .nav-dots{display:none;}
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-logo">up</div>
        <div class="brand-text">impulse<span>up</span> · Treinamento Comercial</div>
      </div>
      <div class="slide-count"><span id="slideNum">1</span> / <span id="slideTotal"></span></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="navbar">
    <button class="nav-btn" id="btnPrev" onclick="goPrev()">← Voltar</button>
    <div class="nav-dots" id="navDots"></div>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Avançar →</button>
  </div>

</div>

<script>
/* ==================== CONTEÚDO DAS TELAS ==================== */
const slides = [];

function s(html){ slides.push(html); }

/* 1 — CAPA */
s(`
<div class="cover">
  <div class="eyebrow">Treinamento de pré-vendedores</div>
  <h1 class="title">ICP, Persona<br>e Concorrentes</h1>
  <p class="lead">Antes de qualquer conversa com um lead, você precisa saber <strong>quem</strong> é o nosso cliente ideal, <strong>com quem</strong> vamos falar dentro daquela empresa e <strong>contra quem</strong> estamos competindo. Esse é o mapa que vai guiar toda a sua qualificação.</p>
  <span class="pill">Passo a passo</span>
  <span class="pill">Com dinâmicas interativas</span>
</div>
`);

/* DIVISOR — Módulo 1 */
s(`
<div class="cover" style="min-height:50vh;">
  <div class="eyebrow">Módulo 1</div>
  <h1 class="title">Contexto de mercado</h1>
  <p class="lead">Por que a impulseup precisa de um ICP bem definido.</p>
</div>
`);

/* 2 — Por que ICP importa */
s(`
<div class="eyebrow">Módulo 1 · Contexto</div>
<h1 class="title">Por que precisamos de um ICP?</h1>
<p class="lead">O mercado de gestão de desempenho está <strong>amadurecendo e cada vez mais competitivo</strong>. Estimamos que entre <strong>100 e 200 empresas</strong> no Brasil vendem soluções de avaliação de desempenho.</p>
<div class="card">
  <div class="card-label">Players consolidados</div>
  <div class="card-body">Qulture.Rocks, Gupy, TOTVS e Sólides concentram a maior parte do market share do mercado hoje.</div>
</div>
<div class="card">
  <div class="card-label">O que isso muda para o SDR</div>
  <div class="card-body">O que antes funcionava — atacar para todos os lados — agora fica cada vez mais difícil. Para sobrevivermos no mercado, precisamos ser <strong>muito bons para um determinado público</strong>. É exatamente isso que o ICP define.</div>
</div>
`);

/* DIVISOR — Módulo 2 */
s(`
<div class="cover" style="min-height:50vh;">
  <div class="eyebrow">Módulo 2</div>
  <h1 class="title">O conceito de ICP</h1>
  <p class="lead">ICP, ACP e UCP — a régua que qualifica todo lead.</p>
</div>
`);

/* 3 — O que é ICP */
s(`
<div class="eyebrow">Módulo 2 · Conceito</div>
<h1 class="title">O que é ICP</h1>
<p class="lead">O <strong>Perfil de Cliente Ideal (ICP)</strong> é a fatia do mercado que mais queremos vender. É a forma de dizermos, de forma ativa, quem é o nosso foco como negócio.</p>
<div class="grid3">
  <div class="card">
    <div class="card-label">ICP</div>
    <div class="card-title">Perfil de cliente ideal</div>
    <div class="card-body">100% para quem queremos ser bons.</div>
  </div>
  <div class="card">
    <div class="card-label">ACP</div>
    <div class="card-title">Perfil aceitável</div>
    <div class="card-body">Não é perfeito, mas ainda tira valor real da solução.</div>
  </div>
  <div class="card">
    <div class="card-label">UCP</div>
    <div class="card-title">Perfil inaceitável</div>
    <div class="card-body">Custa muito e não traz retorno.</div>
  </div>
</div>
<p class="body-text">Essa é a base que vamos usar para qualificar leads e clientes ao longo de todo o treinamento.</p>
`);

/* DIVISOR — Módulo 3 */
s(`
<div class="cover" style="min-height:50vh;">
  <div class="eyebrow">Módulo 3</div>
  <h1 class="title">A base do ICP</h1>
  <p class="lead">Público e Tamanho — as duas variáveis que cruzam para formar a classificação.</p>
</div>
`);

/* 4 — Públicos intro */
s(`
<div class="eyebrow">Módulo 3 · Base do ICP</div>
<h1 class="title">O ICP é o cruzamento de duas variáveis</h1>
<p class="lead">Analisamos muitas variáveis para entender o que impactava a receita e a satisfação. O resultado é simples — e foi feito para ser simples.</p>
<div class="grid2">
  <div class="card">
    <div class="card-label">Variável 1</div>
    <div class="card-title">Público</div>
    <div class="card-body">Operacional Manual, Operacional Especializado ou Corporativo.</div>
  </div>
  <div class="card">
    <div class="card-label">Variável 2</div>
    <div class="card-title">Tamanho</div>
    <div class="card-body">Tamanho da empresa e, principalmente, tamanho do projeto fechado.</div>
  </div>
</div>
`);

/* 5 — Público Operacional Manual */
s(`
<div class="eyebrow">Módulo 3 · Públicos</div>
<h2 class="subtitle">Público Operacional Manual</h2>
<p class="lead">É a força de trabalho de execução direta. Seja operando uma máquina, levantando um muro ou atendendo um cliente no balcão. O foco é <strong>repetição, presença e escala</strong>.</p>
<div class="card">
  <div class="card-label">Quem está aqui</div>
  <div class="card-body"><strong>Esforço físico:</strong> operário de fábrica, pedreiro/mestre de obras, motorista, limpeza.<br><strong>Atendimento/vendas:</strong> vendedor de loja, garçom, porteiro, bancário de agência/caixa.</div>
</div>
<div class="card">
  <div class="card-label">A dor do RH</div>
  <div class="card-body">Turnover alto, absenteísmo (faltas), gestão de escala e motivação básica.</div>
</div>
`);

/* 6 — Público Operacional Especializado */
s(`
<div class="eyebrow">Módulo 3 · Públicos</div>
<h2 class="subtitle">Público Operacional Especializado</h2>
<p class="lead">É o profissional que atua na ponta ("mão na massa"), mas cuja entrega depende de <strong>formação acadêmica superior e registro de classe</strong>. Ele toma decisão técnica baseada em ciência ou pedagogia durante a execução.</p>
<div class="card">
  <div class="card-label">Quem está aqui</div>
  <div class="card-body">Médicos, enfermeiros, professores (docentes), engenheiros de campo/projetos (ART), pilotos, oficiais de marinha.</div>
</div>
<div class="card">
  <div class="card-label">A dor do RH</div>
  <div class="card-body">Retenção de conhecimento (se ele sai, leva a técnica), atualização profissional e gestão de ego técnico.</div>
</div>
`);

/* 7 — Público Corporativo */
s(`
<div class="eyebrow">Módulo 3 · Públicos</div>
<h2 class="subtitle">Público Corporativo</h2>
<p class="lead">É o profissional do conhecimento (White Collar) e da inovação. Ele desenha a estratégia, cria o produto, garante a regulação ou suporta a operação no Backoffice.</p>
<div class="card">
  <div class="card-label">Quem está aqui</div>
  <div class="card-body">Financeiro, RH, Marketing, desenvolvedores (devs), cientistas de dados, especialistas, gerentes de produto, consultores de estratégia, diretores.</div>
</div>
<div class="card">
  <div class="card-label">A dor do RH</div>
  <div class="card-body">Cultura, plano de carreira, bônus/partnership, liderança e saúde mental.</div>
</div>
`);

/* 8 — Tamanho */
s(`
<div class="eyebrow">Módulo 3 · Tamanho</div>
<h1 class="title">Tamanho da empresa x tamanho do projeto</h1>
<p class="lead">Queremos uma proporção boa entre satisfação e retorno financeiro — precisamos ser tão bons para a empresa quanto ela é para nós.</p>
<div class="card">
  <div class="card-label">Regra de ouro</div>
  <div class="card-body"><strong>Tamanho da empresa ≠ tamanho do projeto.</strong> Se a empresa tem 4.000 colaboradores, mas o projeto fechado é para 300, ela ainda é considerada uma <strong>G3</strong>. O que qualifica é o projeto, não o CNPJ.</div>
</div>
<div class="matrix">
  <table>
    <tr><th>Território</th><th>Faixa (colaboradores no projeto)</th></tr>
    <tr><td class="label">M2</td><td>100–249</td></tr>
    <tr><td class="label">M3</td><td>250–499</td></tr>
    <tr><td class="label">G1</td><td>500–999</td></tr>
    <tr><td class="label">G2</td><td>1.000–2.999</td></tr>
    <tr><td class="label">G3</td><td>3.000+</td></tr>
  </table>
</div>
`);

/* 9 — Matriz ICP (informativa) */
s(`
<div class="eyebrow">Módulo 3 · Matriz</div>
<h1 class="title">A matriz de classificação</h1>
<p class="lead">Cruzando Público e Tamanho, chegamos à nossa matriz de classificação. Estude bem — na próxima tela você vai precisar aplicá-la sem consultar.</p>
<div class="matrix">
  <table>
    <tr><th></th><th>&lt;100</th><th>100–250</th><th>250–1000</th><th>1000–5000</th><th>&gt;5000</th></tr>
    <tr><td class="label">Op. Manual</td><td class="ucp">UCP</td><td class="acp3">ACP T3</td><td class="icp">ICP</td><td class="icp">ICP</td><td class="acp4">ACP T4</td></tr>
    <tr><td class="label">Op. Especializado</td><td class="ucp">UCP</td><td class="acp3">ACP T3</td><td class="icp">ICP</td><td class="icp">ICP</td><td class="acp4">ACP T4</td></tr>
    <tr><td class="label">Corporativo</td><td class="acp2">ACP T2</td><td class="acp2">ACP T2</td><td class="acp3">ACP T3</td><td class="acp3">ACP T3</td><td class="acp4">ACP T4</td></tr>
  </table>
</div>
`);

/* DIVISOR — Dinâmica de classificação */
s(`
<div class="cover" style="min-height:50vh;">
  <div class="eyebrow">Dinâmica · Sem consulta</div>
  <h1 class="title">Classifique os 3 cenários</h1>
  <p class="lead">A partir daqui a matriz não está mais visível. Use o que você acabou de estudar.</p>
</div>
`);

/* 10 — GAME: 3 cenários de classificação */
s(`
<div class="eyebrow">Módulo 3 · Dinâmica</div>
<h1 class="title">Classifique o cenário</h1>
<div class="game-box">
  <div class="game-scenario"><strong>Cenário 1 —</strong> "Somos uma indústria com 600 colaboradores na fábrica, o projeto que estamos avaliando é para toda a operação."</div>
  <div class="opt-grid">
    <button class="opt-btn" onclick="checkGame('game1', this, false)">UCP</button>
    <button class="opt-btn" onclick="checkGame('game1', this, false)">ACP Tier 3</button>
    <button class="opt-btn" onclick="checkGame('game1', this, true)">ICP</button>

/* ==================== ENGINE ==================== */
let current = 0;
const total = slides.length;
document.getElementById('slideTotal').textContent = total;
let scoreState = {};

function render(){
  const stage = document.getElementById('stage');
  stage.innerHTML = `<div class="slide active">${slides[current]}</div>`;
  document.getElementById('slideNum').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current)/(total-1)*100)+'%';
  document.getElementById('btnPrev').disabled = current===0;
  document.getElementById('btnNext').textContent = current===total-1 ? 'Concluir ✓' : 'Avançar →';
  buildDots();
  if(current===total-1) updateFinalScore();
}

function buildDots(){
  const wrap = document.getElementById('navDots');
  wrap.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<current?' done':'')+(i===current?' current':'');
    wrap.appendChild(d);
  }
}

function goNext(){ if(current<total-1){ current++; render(); window.scrollTo(0,0);} }
function goPrev(){ if(current>0){ current--; render(); window.scrollTo(0,0);} }

function checkGame(gameId, btn, isCorrect){
  const container = btn.parentElement;
  const buttons = container.querySelectorAll('.opt-btn');
  buttons.forEach(b=>b.disabled=true);
  if(isCorrect){ btn.classList.add('correct'); } else { btn.classList.add('wrong'); }
  const fb = document.getElementById(gameId+'-feedback');
  if(fb){
    fb.classList.add('show');
    if(isCorrect){
      fb.classList.add('correct'); fb.classList.remove('wrong');
      fb.textContent = '✓ Correto!';
      if(!scoreState[gameId]) scoreState[gameId]=1;
    } else {
      fb.classList.add('wrong'); fb.classList.remove('correct');
      fb.textContent = '✗ Não é essa. Reveja o conteúdo acima antes de seguir.';
      scoreState[gameId]=0;
      buttons.forEach(b=>{ if(!b.disabled) return; });
    }
  }
}

function updateFinalScore(){
  const totalGames = ['game1','game1b','game1c','game2','game3'];
  let pts = 0;
  totalGames.forEach(g=>{ if(scoreState[g]===1) pts++; });
  document.getElementById('finalScore').textContent = 'Sua pontuação nas dinâmicas: '+pts+' / '+totalGames.length;
}

render();
</script>
